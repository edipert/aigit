name: 'aigit Context Review'
description: 'Runs aigit ci-report to inject semantic context and design history into PRs'
inputs:
  pr_title:
    description: 'Pull Request title to semantically search'
    required: false
    default: ''
  changed_files:
    description: 'Comma separated list of changed files'
    required: false
    default: ''
  github_token:
    description: 'GITHUB_TOKEN for PR commenting'
    required: true

runs:
  using: "composite"
  steps:
    - name: Run aigit ci-report
      id: generate-report
      shell: bash
      run: |
        echo "Running aigit ci-report..."

        # We assume aigit is globally installed in the runner or available via npx.
        # Alternatively, if this is inside an aigit repository, we can use local script.
        # In a generic usage, users would install aigit globally before calling this action.
        # Given this is a local setup or standard npm setup, we use standard npx.

        npm run build --prefix context-server
        REPORT=$(node context-server/dist/cli/index.js ci-report --pr-title "${{ inputs.pr_title }}" --changed-files "${{ inputs.changed_files }}")

        # We need to multi-line export for GitHub Actions Output
        # https://docs.github.com/en/actions/using-workflows/workflow-commands-for-github-actions#multiline-strings
        EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
        echo "report<<$EOF" >> $GITHUB_OUTPUT
        echo "$REPORT" >> $GITHUB_OUTPUT
        echo "$EOF" >> $GITHUB_OUTPUT

    - name: Comment PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github_token }}
        script: |
          const { issue: { number: issue_number }, repo: { owner, repo }  } = context;
          const report = `${{ steps.generate-report.outputs.report }}`;

          if(!report || report.trim().length === 0) {
             console.log("No report generated by aigit.");
             return;
          }

          // Get existing comments
          const comments = await github.rest.issues.listComments({
            owner, repo, issue_number
          });

          // Look for an existing aigit comment to update instead of creating a new one
          const botComment = comments.data.find(c => c.body.includes('## 🧠 aigit Context Review') && c.user.type === 'Bot');

          if (botComment) {
            await github.rest.issues.updateComment({
              owner, repo, comment_id: botComment.id,
              body: report
            });
          } else {
            await github.rest.issues.createComment({
              owner, repo, issue_number,
              body: report
            });
          }
